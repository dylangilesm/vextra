<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ingresar — VEXTRA</title>
  <meta name="description" content="Accedé a tu panel de control de VEXTRA.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
  <style>
    /* ─── RESET & BASE ─── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black:    #010604;
      --deep:     #041E16;
      --dark:     #041B10;
      --forest:   #0A3524;
      --pine:     #143726;
      --green:    #266247;
      --off-white:#F2F2F2;
      --muted:    #9CA3AF;
      --font-display: 'Outfit', sans-serif;
      --font-body:    'DM Sans', sans-serif;
      --transition: 0.3s cubic-bezier(0.4,0,0.2,1);
    }

    html { font-size: 16px; -webkit-font-smoothing: antialiased; }

    body {
      font-family: var(--font-body);
      background: var(--black);
      color: var(--off-white);
      min-height: 100svh;
      display: grid;
      place-items: center;
      overflow: hidden;
      position: relative;
    }

    /* ─── BACKGROUND ─── */
    .login-bg {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }
    .bg-orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(120px);
    }
    .bg-orb--1 {
      width: 700px; height: 700px;
      background: radial-gradient(circle, #041E16 0%, transparent 65%);
      top: -200px; right: -150px;
      opacity: 0.9;
    }
    .bg-orb--2 {
      width: 500px; height: 500px;
      background: radial-gradient(circle, #0A3524 0%, transparent 70%);
      bottom: -100px; left: -100px;
      opacity: 0.5;
    }
    .bg-grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(38,98,71,0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(38,98,71,0.05) 1px, transparent 1px);
      background-size: 60px 60px;
    }

    /* ─── CARD ─── */
    .login-wrap {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 460px;
      padding: 24px 20px;
    }

    .login-card {
      background: rgba(6, 26, 14, 0.75);
      border: 1px solid rgba(38,98,71,0.25);
      border-radius: 20px;
      padding: clamp(36px, 6vw, 52px) clamp(28px, 5vw, 48px);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow:
        0 0 0 1px rgba(38,98,71,0.08),
        0 40px 80px rgba(0,0,0,0.5),
        inset 0 1px 0 rgba(242,242,242,0.04);
      animation: cardIn 0.6s cubic-bezier(0.4,0,0.2,1) both;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: none; }
    }

    /* Top accent line */
    .login-card::before {
      content: '';
      position: absolute;
      top: 0; left: 24px; right: 24px;
      height: 1.5px;
      background: linear-gradient(90deg, transparent, var(--green), transparent);
      border-radius: 0 0 2px 2px;
    }

    /* ─── LOGO ─── */
    .login-logo {
      display: flex;
      align-items: center;
      margin-bottom: 36px;
      text-decoration: none;
    }
    .login-logo-img {
      position: absolute;
      left: 40px;
      height: 150px;
      width: auto;
      object-fit: contain;
      pointer-events: none;
      filter: brightness(1.1);
    }

    /* ─── HEADING ─── */
    .login-heading { margin-bottom: 36px; }
    .login-heading h2 {
      font-family: var(--font-display);
      font-size: 1.65rem;
      font-weight: 700;
      color: var(--off-white);
      letter-spacing: -0.02em;
      line-height: 1.15;
      margin-bottom: 8px;
    }
    .login-heading p {
      font-size: 0.92rem;
      color: var(--muted);
      font-weight: 300;
      line-height: 1.5;
    }

    /* ─── FORM ─── */
    .form-stack { display: flex; flex-direction: column; gap: 20px; }

    .form-field { display: flex; flex-direction: column; gap: 8px; }
    .form-field label {
      font-size: 0.82rem;
      font-weight: 500;
      color: rgba(242,242,242,0.7);
      letter-spacing: 0.01em;
    }
    .form-field input {
      background: rgba(4,30,22,0.8);
      border: 1px solid rgba(38,98,71,0.25);
      border-radius: 8px;
      padding: 14px 16px;
      font-family: var(--font-body);
      font-size: 0.95rem;
      color: var(--off-white);
      transition: var(--transition);
      outline: none;
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
    }
    .form-field input::placeholder { color: rgba(156,163,175,0.4); }
    .form-field input:focus {
      border-color: rgba(38,98,71,0.7);
      background: rgba(4,27,16,0.95);
      box-shadow: 0 0 0 3px rgba(38,98,71,0.12);
    }
    .form-field input:-webkit-autofill {
      -webkit-box-shadow: 0 0 0 100px #041E16 inset;
      -webkit-text-fill-color: var(--off-white);
    }

    /* ─── SUBMIT BUTTON ─── */
    .btn-submit {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 15px 32px;
      background: var(--green);
      color: var(--off-white);
      border: 1.5px solid var(--green);
      border-radius: 8px;
      font-family: var(--font-body);
      font-size: 0.97rem;
      font-weight: 500;
      cursor: pointer;
      transition: var(--transition);
      letter-spacing: 0.01em;
      margin-top: 4px;
    }
    .btn-submit:hover {
      background: #2f7357;
      border-color: #2f7357;
      transform: translateY(-2px);
      box-shadow: 0 12px 40px rgba(38, 98, 71, 0.35);
    }
    .btn-submit:active { transform: translateY(0); }

    /* ─── DIVIDER ─── */
    .divider {
      display: flex;
      align-items: center;
      gap: 16px;
      margin: 4px 0;
    }
    .divider span { flex: 1; height: 1px; background: rgba(38,98,71,0.2); }
    .divider p {
      font-size: 0.75rem;
      color: var(--muted);
      white-space: nowrap;
    }

    /* ─── HELP NAV ─── */
    .login-help {
      margin-top: 28px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }
    .forgot-link {
      font-size: 0.85rem;
      color: var(--muted);
      transition: color var(--transition);
      text-decoration: none;
    }
    .forgot-link:hover { color: var(--green); }
    .back-link {
      font-size: 0.82rem;
      color: rgba(242,242,242,0.4);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: color var(--transition);
    }
    .back-link:hover { color: rgba(242,242,242,0.8); }

    /* ─── FOOTER NOTE ─── */
    .login-note {
      text-align: center;
      font-size: 0.72rem;
      color: rgba(156,163,175,0.4);
      margin-top: 28px;
      line-height: 1.5;
    }

    /* ─── BACK BUTTON (top) ─── */
    .top-back {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.8rem;
      color: rgba(242,242,242,0.4);
      text-decoration: none;
      margin-bottom: 24px;
      transition: color var(--transition);
    }
    .top-back:hover { color: var(--off-white); }
    .top-back svg { width: 14px; height: 14px; }

    /* ─── RESPONSIVE ─── */
    @media (max-width: 480px) {
      body { align-items: flex-start; padding-top: 0; overflow-y: auto; }
      .login-wrap { padding: 0; }
      .login-card {
        border-radius: 0;
        border-left: none; border-right: none;
        min-height: 100svh;
        padding: 40px 28px;
        display: flex;
        flex-direction: column;
        justify-content: center;
      }
    }
  </style>
</head>
<body>

  <!-- Background -->
  <div class="login-bg" aria-hidden="true">
    <div class="bg-orb bg-orb--1"></div>
    <div class="bg-orb bg-orb--2"></div>
    <div class="bg-grid"></div>
  </div>

  <!-- Card -->
  <div class="login-wrap">
    <a href="index.html" class="top-back" aria-label="Volver a la página principal">
      <svg viewBox="0 0 16 16" fill="none" aria-hidden="true">
        <path d="M10 12L6 8l4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Volver al inicio
    </a>

    <div class="login-card" role="main">

      <a href="index.html" class="login-logo" aria-label="VEXTRA - Volver al inicio">
        <img src="Logo_con_nombre.png" alt="VEXTRA" class="login-logo-img">
      </a>

      <div class="login-heading">
        <h2>Bienvenido de nuevo</h2>
        <p>Ingresá a tu panel de control empresarial</p>
      </div>

      <form
        class="form-stack"
        action="dashboard.html"
        method="GET"
        aria-label="Formulario de inicio de sesión"
        novalidate
      >
        <div class="form-field">
          <label for="email">Correo electrónico</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="tu@correo.com"
            autocomplete="email"
            required
          >
        </div>

        <div class="form-field">
          <label for="password">Contraseña</label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="••••••••"
            autocomplete="current-password"
            required
          >
        </div>

        <button type="submit" class="btn-submit">
          Ingresar al Panel
        </button>
      </form>

      <nav class="login-help" aria-label="Opciones de acceso">
        <a
          href="#"
          class="forgot-link"
          onclick="alert('Te enviaremos un correo para recuperar tu contraseña.'); return false;"
          aria-label="Recuperar contraseña olvidada"
        >
          ¿Olvidaste tu contraseña?
        </a>
      </nav>

      <p class="login-note">
        Acceso exclusivo para clientes VEXTRA.<br>
        ¿No tenés cuenta? <a href="index.html#contacto" style="color:var(--green)">Agendá un diagnóstico</a>.
      </p>

    </div>
  </div>

</body>
</html>
